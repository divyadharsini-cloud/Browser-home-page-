---
- name: Deploy Firefox cache cleanup on boot
  hosts: OP-2
  become: true
  gather_facts: false

  vars:
    cleanup_script_path: /usr/local/bin/clear_firefox_cache.sh
    systemd_service_path: /etc/systemd/system/firefox-cache-cleanup.service
    log_file_path: /var/log/cache_cleanup.log

  tasks:

    - name: Remove existing Firefox cache log file
      file:
        path: "{{ log_file_path }}"
        state: absent

    - name: Create Firefox cache cleanup script
      copy:
        dest: "{{ cleanup_script_path }}"
        mode: '0755'
        content: |
          #!/bin/bash
          LOG_FILE="{{ log_file_path }}"

          # Clear Firefox cache for all user profiles
          for user_home in /home/*; do
            profile_path="$user_home/.cache/mozilla/firefox"
            [ -d "$profile_path" ] || continue

            for cache_dir in "$profile_path"/*/cache2; do
              [ -d "$cache_dir" ] || continue
              rm -rf "$cache_dir"/* 2>/dev/null
            done
          done

          # Write human-readable log
          echo "$(date): Cache cleared" >> "$LOG_FILE"

    - name: Ensure Firefox cache cleanup systemd service exists
      copy:
        dest: "{{ systemd_service_path }}"
        mode: '0644'
        content: |
          [Unit]
          Description=Clear Firefox cache after system boot
          After=multi-user.target

          [Service]
          Type=oneshot
          ExecStart={{ cleanup_script_path }}

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd

    - name: Enable and start Firefox cache cleanup service
      systemd:
        name: firefox-cache-cleanup.service
        enabled: true
        state: started

    - name: Display deployment summary
      debug:
        msg:
          - "✅ Firefox cache cleanup script deployed at: {{ cleanup_script_path }}"
          - "✅ Service enabled and running: firefox-cache-cleanup.service"
          - "✅ Existing cache log cleared: {{ log_file_path }}"

  handlers:
    - name: Reload systemd
      command: systemctl daemon-reload
