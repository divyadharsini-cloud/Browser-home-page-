---
- name: Deploy Firefox cache cleanup with Prometheus epoch
  hosts: linux_servers
  become: true
  gather_facts: false

  vars:
    cleanup_script_path: /usr/local/bin/clear_firefox_cache.sh
    systemd_service_path: /etc/systemd/system/firefox-cache-cleanup.service
    log_file_path: /var/log/cache_cleanup.log

  tasks:

    # 1️⃣ Remove old service if exists
    - name: Stop and disable old service if exists
      systemd:
        name: cache-clear-on-boot.service
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Remove old service file
      file:
        path: /etc/systemd/system/cache-clear-on-boot.service
        state: absent

    - name: Remove old cleanup script
      file:
        path: /usr/local/bin/clear_cache.sh
        state: absent

    # 2️⃣ Create Firefox cache cleanup script with epoch timestamp
    - name: Create Firefox cache cleanup script
      copy:
        dest: "{{ cleanup_script_path }}"
        mode: '0755'
        content: |
          #!/bin/bash
          LOG_FILE="{{ log_file_path }}"

          for user_home in /home/*; do
            profile_path="$user_home/.cache/mozilla/firefox"
            [ -d "$profile_path" ] || continue

            for cache_dir in "$profile_path"/*/cache2; do
              [ -d "$cache_dir" ] || continue
              rm -rf "$cache_dir"/* 2>/dev/null
            done
          done

          # Human-readable log (exactly like old script)
          echo "$(date): Cache cleared" >> "$LOG_FILE"

          # Epoch timestamp appended to the same log file
          CURRENT_TIME=$(date +%s)
          echo "cache_last_cleared_timestamp $CURRENT_TIME" >> "$LOG_FILE"

      notify: Reload systemd

    # 3️⃣ Create systemd service
    - name: Create systemd service file
      copy:
        dest: "{{ systemd_service_path }}"
        mode: '0644'
        content: |
          [Unit]
          Description=Clear Firefox cache after system boot
          After=multi-user.target

          [Service]
          Type=oneshot
          ExecStart={{ cleanup_script_path }}

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd

    # 4️⃣ Enable and start the service
    - name: Enable and start Firefox cache cleanup service
      systemd:
        name: firefox-cache-cleanup.service
        enabled: true
        state: started

    # 5️⃣ Display current logs (optional)
    - name: Show full log entries
      shell: cat "{{ log_file_path }}"
      register: cleanup_log
      ignore_errors: true

    - name: Display result summary
      debug:
        msg:
          - "Firefox cleanup service deployed successfully"
          - "Full log entries:"
          - "{{ cleanup_log.stdout_lines | default(['No logs yet']) }}"

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: true
