---
- name: Deploy Firefox cache cleanup on boot
  hosts: DMDUPH1FPAE0213
  become: true
  gather_facts: false

  vars:
    cleanup_script_path: /usr/local/bin/clear_cache.sh
    systemd_service_path: /etc/systemd/system/cache-clear-on-boot.service
    log_file_path: /var/log/cache_cleanup.log

  tasks:

    - name: Create Firefox cache cleanup script
      copy:
        dest: "{{ cleanup_script_path }}"
        mode: '0755'
        content: |
          #!/bin/bash

          LOG_FILE="{{ log_file_path }}"

          for user_home in /home/*; do
            profile_path="$user_home/.cache/mozilla/firefox"
            [ -d "$profile_path" ] || continue

            for cache_dir in "$profile_path"/*/cache2; do
              [ -d "$cache_dir" ] || continue
              rm -rf "$cache_dir"/* 2>/dev/null
            done
          done

          echo "$(date): Cache cleared" >> "$LOG_FILE"

    - name: Create systemd service for Firefox cache cleanup
      copy:
        dest: "{{ systemd_service_path }}"
        mode: '0644'
        content: |
          [Unit]
          Description=Clear Firefox cache after system boot
          After=multi-user.target

          [Service]
          Type=oneshot
          ExecStart={{ cleanup_script_path }}

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd

    - name: Enable and start Firefox cache cleanup service
      systemd:
        name: cache-clear-on-boot.service
        enabled: true
        state: started

    - name: Run cleanup once immediately
      command: "{{ cleanup_script_path }}"
      register: cleanup_result
      changed_when: false

    - name: Read cache cleanup log
      shell: "tail -n 5 {{ log_file_path }}"
      register: cleanup_log
      ignore_errors: true
      changed_when: false

    - name: Display deployment summary
      debug:
        msg:
          - "✅ Cache cleanup script deployed at: {{ cleanup_script_path }}"
          - "✅ Systemd service installed: {{ systemd_service_path }}"
          - "✅ Service enabled to trigger on boot"
          - "🧾 Last cleanup log entries:"
          - "{{ cleanup_log.stdout_lines | default(['No logs yet']) }}"

  handlers:
    - name: Reload systemd
      command: systemctl daemon-reload
