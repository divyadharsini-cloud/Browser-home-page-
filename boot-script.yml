---
- name: Remove old cache-clear service and start Firefox cleanup service
  hosts: GF-2
  become: true
  gather_facts: false

  tasks:

    - name: Stop and disable old service
      systemd:
        name: cache-clear-on-boot.service
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Remove old service file
      file:
        path: /etc/systemd/system/cache-clear-on-boot.service
        state: absent

    - name: Remove old cleanup script
      file:
        path: /usr/local/bin/clear_cache.sh
        state: absent

    - name: Reload systemd
      systemd:
        daemon_reload: true

    - name: Enable and start firefox-cache-cleanup service
      systemd:
        name: firefox-cache-cleanup.service
        state: started
        enabled: true
