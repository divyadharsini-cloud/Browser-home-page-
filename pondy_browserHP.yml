---
- name: Enforce Firefox Enterprise Policies (via /etc only)
  hosts: FH-pdy
  become: yes
  gather_facts: no

  tasks:

    - name: Ensure /etc/firefox exists
      file:
        path: /etc/firefox
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure /etc/firefox/policies exists
      file:
        path: /etc/firefox/policies
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Backup existing policies.json if it exists
      copy:
        src: /etc/firefox/policies/policies.json
        dest: /etc/firefox/policies/policies.json.bak
        remote_src: yes
      ignore_errors: yes

    - name: Deploy merged Firefox policies.json
      copy:
        dest: /etc/firefox/policies/policies.json
        owner: root
        group: root
        mode: '0644'
        content: |
          {
            "policies": {
              "DisableAppUpdate": true,
              "DisablePasswordManager": true,
              "PasswordManagerEnabled": false,
              "DisableFirefoxAccounts": true,
              "BlockAboutAddons": true,

              "Homepage": {
                "Locked": true,
                "URL": "https://eyenotes.aravind.org/eyenotes"
              },

              "PopupBlocking": {
                "Default": false,
                "Locked": true
              },

              "SanitizeOnShutdown": {
                "Cache": true
              },

              "DisableSystemAddonUpdate": true,
              "DisableProfileImport": true,
              "DisableProfileRefresh": true,

              "FirefoxHome": {
                "Search": true,
                "TopSites": false,
                "SponsoredTopSites": false,
                "Highlights": false,
                "Pocket": false,
                "SponsoredPocket": false,
                "Snippets": false,
                "Locked": true
              },

              "ExtensionSettings": {
                "*": {
                  "installation_mode": "blocked"
                }
              },

              "Preferences": {
                "signon.rememberSignons": {
                  "Value": false,
                  "Status": "locked"
                },

                "browser.uiCustomization.state": {
                  "Value": "",
                  "Status": "locked"
                },

                "extensions.update.enabled": {
                  "Value": false,
                  "Status": "locked"
                },

                "app.update.enabled": {
                  "Value": false,
                  "Status": "locked"
                },

                "app.update.auto": {
                  "Value": false,
                  "Status": "locked"
                },

                "app.normandy.enabled": {
                  "Value": false,
                  "Status": "locked"
                },

                "app.shield.optoutstudies.enabled": {
                  "Value": false,
                  "Status": "locked"
                },

                "toolkit.telemetry.enabled": {
                  "Value": false,
                  "Status": "locked"
                },

                "browser.newtabpage.enabled": {
                  "Value": false,
                  "Status": "locked"
                }
              }
            }
          }
