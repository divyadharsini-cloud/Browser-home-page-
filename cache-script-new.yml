---
- name: Remove old cache service and deploy Firefox cache cleanup
  hosts: linux_servers
  become: true
  gather_facts: false

  vars:
    cleanup_script_path: /usr/local/bin/clear_firefox_cache.sh
    systemd_service_path: /etc/systemd/system/firefox-cache-cleanup.service
    log_file_path: /var/log/cache_cleanup.log

  tasks:

    # ----------------------------
    # Remove OLD backend service
    # ----------------------------
    - name: Stop and disable old service if exists
      systemd:
        name: cache-clear-on-boot.service
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Remove old service file
      file:
        path: /etc/systemd/system/cache-clear-on-boot.service
        state: absent

    - name: Remove old cleanup script
      file:
        path: /usr/local/bin/clear_cache.sh
        state: absent

    # ----------------------------
    # Deploy NEW Firefox cleanup
    # ----------------------------
    - name: Create Firefox cache cleanup script
      copy:
        dest: "{{ cleanup_script_path }}"
        mode: '0755'
        content: |
          #!/bin/bash
          LOG_FILE="{{ log_file_path }}"
          CLEANED=0

          for user_home in /home/*; do
            profile_path="$user_home/.cache/mozilla/firefox"
            [ -d "$profile_path" ] || continue

            for cache_dir in "$profile_path"/*/cache2; do
              [ -d "$cache_dir" ] || continue
              rm -rf "$cache_dir"/*
              CLEANED=1
            done
          done

          if [ "$CLEANED" -eq 1 ]; then
            echo "$(date '+%Y-%m-%d %H:%M:%S'): Cache cleared" > "$LOG_FILE"
          fi
      notify: Reload systemd

    - name: Create systemd service file
      copy:
        dest: "{{ systemd_service_path }}"
        mode: '0644'
        content: |
          [Unit]
          Description=Clear Firefox cache contents after system boot
          After=multi-user.target

          [Service]
          Type=oneshot
          ExecStart={{ cleanup_script_path }}

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd

    - name: Enable and start Firefox cache cleanup service
      systemd:
        name: firefox-cache-cleanup.service
        state: started
        enabled: true

    - name: Show current cleanup log (if exists)
      shell: cat "{{ log_file_path }}"
      register: cleanup_log
      ignore_errors: true

    - name: Display result summary
      debug:
        msg:
          - "Old backend service removed (if existed)"
          - "Firefox cleanup service deployed and started"
          - "{{ cleanup_log.stdout | default('No log entry yet') }}"

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: true
