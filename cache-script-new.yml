---
- name: Deploy automatic Firefox cache cleanup on boot
  hosts: DMDUPH1FIOLCOU1
  become: true
  gather_facts: false

  vars:
    cleanup_script_path: /usr/local/bin/clear_firefox_cache.sh
    systemd_service_path: /etc/systemd/system/firefox-cache-cleanup.service
    log_file_path: /var/log/cache_cleanup.log

  tasks:

    - name: Create Firefox cache cleanup script
      copy:
        dest: "{{ cleanup_script_path }}"
        mode: '0755'
        content: |
          #!/bin/bash
          LOG_FILE="{{ log_file_path }}"

          echo "------------------------------------------" >> "$LOG_FILE"
          echo "$(date): Starting Firefox cache content cleanup" >> "$LOG_FILE"

          for user_home in /home/*; do
            profile_path="$user_home/.cache/mozilla/firefox"
            [ -d "$profile_path" ] || continue

            for cache_dir in "$profile_path"/*/cache2; do
              [ -d "$cache_dir" ] || continue
              rm -rf "$cache_dir"/*
              echo "$(date): Cleared cache2 contents for $cache_dir" >> "$LOG_FILE"
            done
          done

          echo "$(date): Firefox cache content cleanup completed" >> "$LOG_FILE"

    - name: Create systemd service file
      copy:
        dest: "{{ systemd_service_path }}"
        mode: '0644'
        content: |
          [Unit]
          Description=Clear Firefox cache contents after system boot
          After=multi-user.target

          [Service]
          Type=oneshot
          ExecStart={{ cleanup_script_path }}

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      command: systemctl daemon-reload

    - name: Enable Firefox cache-cleanup service
      systemd:
        name: firefox-cache-cleanup.service
        enabled: true

    - name: (Optional) Run cleanup once immediately
      command: "{{ cleanup_script_path }}"
      register: cleanup_result
      changed_when: false

    - name: Show last cleanup execution log
      shell: tail -n 5 "{{ log_file_path }}"
      register: cleanup_log
      ignore_errors: yes

    - name: Display result summary
      debug:
        msg:
          - "✅ Cache cleanup script deployed at: {{ cleanup_script_path }}"
          - "✅ Systemd service installed at: {{ systemd_service_path }}"
          - "✅ Service enabled to trigger on boot"
          - "🧾 Last cleanup log entries:"
          - "{{ cleanup_log.stdout_lines | default(['No logs yet']) }}"
