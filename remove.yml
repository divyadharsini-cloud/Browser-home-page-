---
- name: Remove Firefox cache cleanup service and script
  hosts: Batch1
  become: true
  gather_facts: false

  vars:
    cleanup_script_path: /usr/local/bin/clear_firefox_cache.sh
    systemd_service_path: /etc/systemd/system/firefox-cache-cleanup.service

  tasks:

    - name: Stop Firefox cache cleanup service if running
      ansible.builtin.systemd:
        name: firefox-cache-cleanup.service
        state: stopped
      ignore_errors: true

    - name: Disable Firefox cache cleanup service
      ansible.builtin.systemd:
        name: firefox-cache-cleanup.service
        enabled: false
      ignore_errors: true

    - name: Remove Firefox cleanup script
      ansible.builtin.file:
        path: "{{ cleanup_script_path }}"
        state: absent

    - name: Remove systemd service file
      ansible.builtin.file:
        path: "{{ systemd_service_path }}"
        state: absent
      notify: Reload systemd

    - name: Show result
      debug:
        msg: "Firefox cache cleanup service and script removed successfully"

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
